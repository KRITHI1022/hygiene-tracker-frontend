<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hygiene Tracker — Citizen Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <!-- Leaflet CSS (CRUCIAL) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="" crossorigin=""/>

  <!-- App styles -->
  <link rel="stylesheet" href="assets/css/style.css">

  <style>
    :root {
      --primary: #2b7a78;
      --muted-text: #6b7a79;
    }
    body {
      background: #f7fbfb;
      font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, Arial;
      color: #17252a;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
    }
    /* Page container constrained to a readable width */
    .page-wrapper {
      max-width: 1100px;
      margin: 18px auto;
      padding: 0 12px 40px;
    }

    /* Navbar */
    .navbar {
      background: white;
      box-shadow: 0 1px 6px rgba(12,20,20,0.04);
      border-bottom: 1px solid rgba(16,24,24,0.04);
    }
    .navbar-brand { color: var(--primary); font-weight:700; }

    /* Stat cards */
    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.04);
      text-align: center;
    }
    .stat-card h6 { color: var(--muted-text); font-weight:600; font-size:0.85rem; margin-bottom:6px; }
    .stat-card h3 { margin:0; color: #123; font-weight:700; }

    /* Map container */
    .map-card {
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.04);
    }
    #map {
      width: 100%;
      height: 420px;            /* explicit height */
      border-radius: 8px;
      z-index: 1;
    }

    /* Force Leaflet container sizing when CSS loaded late */
    .leaflet-container { width: 100% !important; height: 420px !important; border-radius:8px; }

    /* Forms & tables */
    .small-muted { color: var(--muted-text); font-size:0.88rem; }
    .report-card { background:#fff; border-radius:12px; padding:12px; margin-top:12px; box-shadow:0 3px 10px rgba(0,0,0,0.04); }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      #map, .leaflet-container { height: 320px !important; }
      .page-wrapper { padding: 0 8px; }
    }

    /* minor button polish */
    .btn-primary-theme {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
    }
    .btn-primary-theme:hover { opacity:0.95; transform: translateY(-1px); transition: 0.12s; }
  </style>
</head>
<body>
  <!-- NAV -->
  <!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold" style="color:#2b7a78;" href="#">Hygiene Tracker</a>

    <div class="d-flex align-items-center">
      <span id="userName" class="me-3 text-muted small"></span>

      <!-- profile icon -->
      <button id="profileBtn" class="btn btn-sm btn-outline-secondary me-2">
        <i class="bi bi-person-circle"></i> Profile
      </button>

      <button id="logoutBtn" class="btn btn-sm text-white" style="background-color:#2b7a78;">Logout</button>
    </div>
  </div>
</nav>


  <!-- PAGE -->
  <div class="page-wrapper">
    <h5 style="color:var(--primary); margin-bottom:10px;">Citizen Dashboard</h5>

    <!-- Stats -->
    <div class="row g-3">
      <div class="col-12 col-md-4">
        <div class="stat-card">
          <h6>Active Bins Near You</h6>
          <h3 id="binCount">--</h3>
        </div>
      </div>
      <div class="col-12 col-md-4">
        <div class="stat-card">
          <h6>Issues Reported</h6>
          <h3 id="issueCount">--</h3>
        </div>
      </div>
      <div class="col-12 col-md-4">
        <div class="stat-card">
          <h6>Resolved Alerts</h6>
          <h3 id="resolvedCount">--</h3>
        </div>
      </div>
    </div>

    <!-- Map & reporting -->
    <div class="row mt-3 g-3">
      <div class="col-12">
        <div class="map-card">
          <h6 class="small-muted">Nearby Hygiene Map</h6>
          <div id="map" role="region" aria-label="Hygiene locations map"></div>
        </div>

        <div class="report-card mt-3">
          <h6 class="small-muted">Report Unclean Area</h6>
          <form id="reportForm" class="row g-2">
            <div class="col-md-6">
              <input id="location" class="form-control" placeholder="Enter location (eg: T. Nagar Market)" required>
            </div>
            <div class="col-md-6">
              <input id="description" class="form-control" placeholder="Short description" required>
            </div>
            <div class="col-12 text-end mt-2">
              <button class="btn btn-primary-theme">Submit Report</button>
            </div>
          </form>

          <div id="reportMsg" class="mt-2 small fw-semibold"></div>
        </div>

        

        <div class="report-card mt-3">
          <h6 class="small-muted">My Reports</h6>
          <div class="table-responsive">
            <table class="table table-sm">
              <thead class="table-light">
                <tr><th>#</th><th>Location</th><th>Description</th><th>Status</th></tr>
              </thead>
              <tbody id="reportTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts (leaflet + app js) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="assets/js/citizen.js"></script>
</body>
</html>
