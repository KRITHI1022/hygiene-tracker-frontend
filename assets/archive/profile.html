<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hygiene Tracker | Profile</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Theme color -->
  <style>
    :root { --primary: #2b7a78; }
    body {
      background-color: #f7fbfb;
      font-family: 'Poppins', sans-serif;
      color: #17252a;
    }
    .navbar { background-color: white; box-shadow: 0 1px 6px rgba(0, 0, 0, 0.05); }
    .navbar-brand { color: var(--primary); font-weight: 700; }
    .card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
      background-color: white;
    }
    .btn-theme {
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
    }
    .btn-theme:hover { opacity: 0.9; }
    .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--primary);
    }
    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 0.15rem rgba(43, 122, 120, 0.25);
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg mb-4">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="#">Hygiene Tracker</a>
      <div class="ms-auto d-flex align-items-center">
        <button id="backBtn" class="btn btn-sm btn-outline-secondary me-2">← Back</button>
        <button id="logoutBtn" class="btn btn-sm btn-theme">Logout</button>
      </div>
    </div>
  </nav>

  
  <!-- Profile Card -->
  <div class="container mb-5" style="max-width: 800px;">
    <div class="card p-4">
      <h5 class="fw-bold mb-4" style="color: var(--primary);">User Profile</h5>

      <div class="text-center mb-4">
        <img id="profileImage" src="assets/images/default-avatar.png" class="profile-pic mb-2" alt="Profile Photo" />
        <div>
          <input type="file" id="photoUpload" accept="image/*" class="form-control mt-2" style="max-width: 250px; margin: auto;">
        </div>
      </div>

      <form id="profileForm" class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Full Name</label>
          <input type="text" id="name" class="form-control" readonly />
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-control" readonly />
        </div>
        <div class="col-md-6">
          <label class="form-label">Aadhar Number</label>
          <input type="text" id="aadhar" class="form-control" placeholder="Enter your Aadhar" />
        </div>
        <div class="col-md-6">
          <label class="form-label">Age</label>
          <input type="number" id="age" class="form-control" placeholder="Enter your age" />
        </div>
        <div class="col-md-6">
          <label class="form-label">State</label>
          <input type="text" id="state" class="form-control" placeholder="Enter your state" />
        </div>
        <div class="col-md-6">
          <label class="form-label">District</label>
          <input type="text" id="district" class="form-control" placeholder="Enter your district" />
        </div>
        <div class="col-md-6">
          <label class="form-label">Area</label>
          <input type="text" id="area" class="form-control" placeholder="Enter your area" />
        </div>
        <div class="col-md-6">
          <label class="form-label">Municipal Office</label>
          <input type="text" id="municipalOffice" class="form-control" placeholder="Enter your office or ward" />
        </div>
        <div class="col-md-6">
          <label class="form-label">User Type</label>
          <input type="text" id="userType" class="form-control" readonly />
        </div>

        <div class="col-12 text-end mt-3">
          <button type="submit" class="btn btn-theme px-4">Save Profile</button>
        </div>
      </form>

      <div id="saveMsg" class="mt-3 fw-semibold text-center"></div>
    </div>
  </div>

  <script src="assets/js/profile.js"></script>
</body>
</html>
