<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hygiene Tracker | Create Account </title>

<!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #cfe3e1;
    }
/* ===== AUTH LAYOUT ===== */
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-frame {
      width: 100%;
      max-width: 1000px;
      background: #f4fbfa;
      border-radius: 28px;
      display: flex;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.12);
      overflow: hidden;
    }
    /* LEFT ILLUSTRATION PANEL */
    .auth-illustration {
      flex: 1;
      background-image: url("assets/images/register-image.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #2b7a78;
      position: relative; /* anchor for ::after */
    }

    .auth-illustration::after {
      content: "";
      position: absolute;   /* 🔥 REQUIRED */
      inset: 0;
      background: rgba(0, 0, 0, 0.05);
      pointer-events: none;
    }
/* RIGHT FORM PANEL */
    .auth-form {
      flex: 1;
      background: #ffffff;
      padding: 50px 45px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .brand {
      color: #2b7a78;
      font-size: 1.9rem;
      font-weight: 700;
      margin-bottom: 5px;
    }
    .subtitle {
      color: #6b7d7c;
      font-size: 0.95rem;
      margin-bottom: 36px;
    }
/* ===== INPUTS ===== */
    .input-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #eaf3f2;          /* soft filled background */
      border: 1.5px solid #cfe3e1;
      border-radius: 10px;
      padding: 12px 14px;
      transition: 
        background-color 0.25s ease,
        border-color 0.25s ease,
        box-shadow 0.25s ease,
        transform 0.2s ease;
    }
    .input-wrapper:hover {
      background: #f1f8f7;
    }
    .input-wrapper i {
      color: #2b7a77;
      font-size: 1rem;
      transition: color 0.25s ease, transform 0.25s ease;
    }
    .input-wrapper:focus-within {
      border-color: #2b7a78;
      background: #ffffff;
    }
    .input-wrapper input::placeholder {
      color: #2b7a77;
    }
    .input-wrapper:focus-within i {
      transform: scale(1.05);
    }
    .input-wrapper input,
    .input-wrapper select {
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      font-size: 0.95rem;
      color: #333;
      transition: color 0.2s ease;
    }
    .input-wrapper select {
      appearance: none;
      cursor: pointer;
      color: #2b7a78;
      font-weight: 500;
      padding-right: 30px;
    }
    .select-wrapper {
      position: relative;
    }
    .select-wrapper select option[disabled] {
      color: #7a9d9b;
    }
    .input-wrapper:focus-within {
      background: #ffffff;
      border-color: #2b7a78;
      box-shadow: 0 0 0 3px rgba(43, 122, 120, 0.12);
      transform: translateY(-1px);
    }
    .input-wrapper:active {
      transform: translateY(0);
    }
/* form */
    .form-label {
      font-weight: 500;
      font-size: 0.9rem;
    }
    .form-control,
    .form-select {
      border-radius: 10px;
      padding: 10px 12px;
    }
    .form-control:focus,
    .form-select:focus {
      border-color: #2b7a78;
      box-shadow: none;
    }
/* ===== BUTTONS ===== */
    .btn-primary {
      background-color: #2b7a78;
      border-color: #2b7a78;
      padding: 12px;
      font-weight: 600;
      border-radius: 10px;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }
    .btn-primary:hover {
      background-color: #256d6b;
      transform: translateY(-1px);
    }
     .btn-primary:active {
      transform: translateY(0);
    }
/* ===== FOOTER TEXT ===== */
    .footer-text {
      margin-top: 18px;
      font-size: 0.85rem;
      text-align: center;
    }
    .footer-text a {
      color: #2b7a78;
      font-weight: 600;
      text-decoration: none;
    }
/*mobile responsive*/
    @media (max-width: 768px) {
      .auth-frame {
        flex-direction: column;
      }
      .auth-illustration {
        display: none;
      }
      .auth-form {
        padding: 48px 28px;
      }
    }
/*auth image scaling*/ 
    .auth-illustration img {
      max-width: 100%;
      height: auto;
      transform: scale(1.10);
    }
    .auth-illustration {
      align-items: flex-end;
      padding-bottom: 80px;
    }
/* ===== DIVIDER ===== */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: #888;
      font-size: 0.85rem;
    }
    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      border-bottom: 1px solid #ddd;
    }
    .divider span {
      padding: 0 10px;
    }
/* ===== PASSWORD TOGGLE ===== */
    .password-wrapper {
      position: relative;
    }
    .toggle-password {
      cursor: pointer;
      color: #2b7a78;
      font-size: 1.05rem;
      transition: opacity 0.2s ease;
    }
    .toggle-password:hover {
      opacity: 0.7;
    }
/* Social buttons */
    .social-btn {
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 10px;
      padding: 10px 0;
      font-size: 1.2rem;
      transition: all 0.2s ease;
      color: #256d6b;
    }
    .social-btn:hover {
      background: #f4f9f8;
      border-color: #2b7a78;
      color: #2b7a78;
    }
/* Dropdown icon on right */
    .dropdown-icon {
      position: absolute;
      right: 14px;
      font-size: 1rem;
      color: #2b7a78;
      pointer-events: none; /* allows click through */
    }
    #inviteCodeWrapper {
      display: none;
    }
    
  </style>
</head>

<body>
  <div class="auth-wrapper">
    <div class="auth-frame">
      <div class="auth-illustration"></div>
      <!-- RIGHT SIDE (FORM) -->
      <div class="auth-form">
        <h3 class="brand">Hygiene Tracker</h3>
        <p class="subtitle">Create your account to get started</p>
        <form id="registerForm">
          <!-- name -->
          <div class="mb-3">
            <div class="input-wrapper">
              <i class="bi bi-person"></i>
              <input type="text" name="name" id="name" placeholder="Full name" required>
            </div>
          </div>
          <!-- Email -->
          <div class="mb-3">
            <div class="input-wrapper">
              <i class="bi bi-envelope"></i>
              <input type="email" name="email" id="email" placeholder="Email address" required>
            </div>
          </div>
          <!-- Password -->
          <div class="mb-3">
            <div class="input-wrapper password-wrapper">
              <i class="bi bi-lock"></i>
              <input type="password" name="password" placeholder="Password" id="passwordInput" required>
              <i class="bi bi-eye-slash toggle-password" id="togglePassword"></i>
            </div>
          </div>
          <!-- Register As -->
        <div class="mb-3">
          <div class="input-wrapper select-wrapper">
            <i class="bi bi-person"></i>
            <select title="role" id="roleSelect" required>
              <option value="" disabled selected>Register as</option>
              <option value="CITIZEN">Citizen</option>
              <option value="OFFICIAL">Municipal Official</option>
            </select>
            <i class="bi bi-chevron-down dropdown-icon"></i>
          </div>
        </div>

        <!-- Invite Code (Official only) -->
        <div class="mb-4" id="inviteCodeWrapper">
          <div class="input-wrapper">
            <i class="bi bi-shield-lock"></i>
            <input type="text" name="inviteCode" id="inviteCodeInput" placeholder="Official Invite Code">
          </div>
        </div>
        <!-- Ward Number -->
        <div class="mb-3" id="wardNumberWrapper">
          <div class="input-wrapper">
            <i class="bi bi-geo-alt"></i>
            <input type="text" id="wardNumber" placeholder="Ward Number" required>
          </div>
        </div>
          <!-- submit button -->
          <button type="submit" class="btn btn-primary w-100">Create Account</button>
        </form>
        <div class="divider"><span>or</span></div>
        <!-- social login buttons -->
        <div class="d-flex justify-content-between gap-2">
          <button class="btn social-btn w-100"><i class="bi bi-google"></i></button>
          <button class="btn social-btn w-100"><i class="bi bi-microsoft"></i></button>
          <button class="btn social-btn w-100"><i class="bi bi-apple"></i></button>
        </div>
        <!-- footer part -->
        <div class="footer-text">Already have an account?<a href="index.html"> Login here</a></div>
        <div id="message" class="text-center mt-2 fw-semibold"></div>
      </div>
    </div>
  </div>
  <script src="js/auth.js"></script>
<script>
  document.getElementById("registerForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("passwordInput").value.trim();
    const role = document.getElementById("roleSelect").value;
    const wardNumber = document.getElementById("wardNumber").value.trim();

    const messageEl = document.getElementById("message");
    messageEl.textContent = "Creating account...";
    messageEl.style.color = "#2b7a78";

    const result = await registerUser({ name, email, password, role, wardNumber });

    if (result.success) {
      messageEl.textContent = "Account created successfully!";
      setTimeout(() => {
        if (result.role === "OFFICIAL") {
          window.location.href = "official-dashboard.html";
        } else {
          window.location.href = "user-profile.html";
        }
      }, 1000);
    } else {
      messageEl.style.color = "red";
      messageEl.textContent = result.message;
    }
});
</script>

</body>
</html>
