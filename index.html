<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hygiene Tracker | Login</title>

<!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #cfe3e1;
    }
/* ===== AUTH LAYOUT ===== */
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-frame {
      width: 100%;
      max-width: 1000px;
      background: #f4fbfa;   
      border-radius: 28px;
      display: flex;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.12);  /* subtle elevation */
      overflow: hidden;
    }
    /* LEFT ILLUSTRATION PANEL */
    .auth-illustration {
      flex: 1;
      background-image: url("assets/images/register-image.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #2b7a78;
      position: relative; /* anchor for ::after */
    }

    .auth-illustration::after {
      content: "";
      position: absolute;   /* 🔥 REQUIRED */
      inset: 0;
      background: rgba(0, 0, 0, 0.05);
      pointer-events: none;
    }
/* ===== RIGHT PANEL ===== */
    .auth-form {
      flex: 1;
      background: #ffffff;
      padding: 50px 45px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .brand {
      color: #2b7a78;
      font-size: 1.9rem;
      font-weight: 700;
      margin-bottom: 5px;
    }
    .subtitle {
      color: #6b7d7c;
      font-size: 0.95rem;
      margin-bottom: 36px;
    }
/* ===== FORM ELEMENTS ===== */
    .input-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #eaf3f2;
      border: 1.5px solid  #cfe3e1;
      border-radius: 10px;
      padding: 12px 14px;
      transition: 
        background-color 0.25s ease,
        border-color 0.25s ease,
        box-shadow 0.25s ease,
        transform 0.2s ease;
    }
    .input-wrapper:hover {
      background: #f1f8f7;
    }
    .input-wrapper i {
      color: #2b7a78;
      font-size: 1rem;
      transition: color 0.25s ease, transform 0.25s ease;
    }
    .input-wrapper:focus-within {
      background: #ffffff;
      border-color: #2b7a78;
    }
    .input-wrapper input::placeholder {
      color: #2b7a77;
    }
    .input-wrapper:focus-within i {
      transform: scale(1.05);
    }
    .input-wrapper input,
    .input-wrapper select {
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      font-size: 0.95rem;
      color: #333;
      transition: color 0.2s ease;
    }
    .input-wrapper select {
      appearance: none;
      cursor: pointer;
      color: #2b7a78;
      font-weight: 500;
      padding-right: 30px;
    }
    .select-wrapper {
      position: relative;
    }
    .select-wrapper select option[disabled] {
      color: #7a9d9b;
    }
    .input-wrapper:focus-within {
      background: #ffffff;
      border-color: #2b7a78;
      box-shadow: 0 0 0 3px rgba(43, 122, 120, 0.12);
      transform: translateY(-1px);
    }
    .input-wrapper:active {
      transform: translateY(0);
    }
/* form */
    .form-label {
      font-weight: 500;
      font-size: 0.9rem;
    }
    .form-control,
    .form-select {
      border-radius: 10px;
      padding: 10px 12px;
    }
    .form-control:focus,
    .form-select:focus {
      border-color: #2b7a78;
      box-shadow: none;
    }
/* ===== BUTTON ===== */
    .btn-primary {
      background-color: #2b7a78;
      border-color: #2b7a78;
      padding: 12px;
      border-radius: 10px;
      font-weight: 600;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }
    .btn-primary:hover {
      background-color:  #256d6b;
      transform: translateY(-1px);
    }
    .btn-primary:active {
      transform: translateY(0);
    }
/* ===== FOOTER TEXT ===== */
    .footer-text {
      margin-top: 18px;
      font-size: 0.85rem;
      text-align: center;
    }
    .footer-text a {
      color: #2b7a78;
      font-weight: 600;
      text-decoration: none;
    }
/* ===== MOBILE ===== */
    @media (max-width: 768px) {
      .auth-frame {
        flex-direction: column;
      }
      .auth-illustration {
        display: none;
      }
      .auth-form {
        padding: 48px 28px;
      }
    }
/*auth image scaling*/
    .auth-illustration img {
      max-width: 100%;
      height: auto;
      transform: scale(1.10);
    }
    .auth-illustration {
      align-items: flex-end;
      padding-bottom: 80px;
    }
/* ===== DIVIDER ===== */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: #888;
      font-size: 0.85rem;
    }
    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      border-bottom: 1px solid #ddd;
    }
    .divider span {
      padding: 0 10px;
    }
/* ===== PASSWORD TOGGLE ===== */
    .password-wrapper {
      position: relative;
    }
    .toggle-password {
      cursor: pointer;
      color: #2b7a78;
      font-size: 1.05rem;
      transition: opacity 0.2s ease;
    }
    .toggle-password:hover {
      opacity: 0.7;
    }
/* ===== SOCIAL BUTTONS ===== */
    .social-btn {
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 10px;
      padding: 10px 0;
      font-size: 1.2rem;
      transition: all 0.2s ease;
      color: #256d6b;
    }
    .social-btn:hover {
      background: #f4f9f8;
      border-color: #2b7a78;
      color: #2b7a78;
    }
/* ===== REMEMBER ME ===== */
    .remember-row {
      font-size: 0.85rem;
      color: #555;
    }
    .remember-me {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .remember-me input {
      accent-color: #2b7a78;
      cursor: pointer;
    }
/* Disabled remember me */
    .remember-me input:disabled + span {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .forgot-link {
      color: #2b7a78;
      text-decoration: none;
      font-weight: 500;
    }
    .forgot-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="auth-wrapper">
    <div class="auth-frame">
      <div class="auth-illustration"></div>
      <!-- RIGHT -->
      <div class="auth-form">
        <h2 class="brand">Hygiene Tracker</h2>
        <p class="subtitle">Welcome back! Login to your account</p>
        <form id="loginForm">
          <div class="mb-3">
            <!-- email -->
            <div class="input-wrapper">
              <i class="bi bi-envelope"></i>
              <input type="email" placeholder="Email address" required>
            </div>
          </div>
          <!-- password -->
          <div class="mb-3">
            <div class="input-wrapper password-wrapper">
              <i class="bi bi-lock"></i>
              <input type="password" placeholder="Password" id="passwordInput" required>
              <i class="bi bi-eye-slash toggle-password" id="togglePassword"></i>
            </div>
          </div>
          <!-- extras -->
          <div class="d-flex justify-content-between align-items-center mb-3 remember-row">
            <label class="remember-me">
              <input type="checkbox" id="rememberMe" disabled><span>Remember me</span>
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          <!-- submit button -->
          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <div class="divider"><span>or</span></div>
        <!-- social login buttons -->
        <div class="d-flex justify-content-between gap-2">
          <button class="regicon btn social-btn w-100"><i class="bi bi-google"></i></button>
          <button class="regicon btn social-btn w-100"><i class="bi bi-microsoft"></i></button>
          <button class="regicon btn social-btn w-100"><i class="bi bi-apple"></i></button>
        </div>
        <!-- footer part -->
        <div class="footer-text">Don’t have an account?<a href="register.html"> Register here</a></div>
      </div>
    </div>
  </div>
  <script src="js/auth.js"></script>
<script>
  document.getElementById("loginForm").addEventListener("submit", async function (e) {
  e.preventDefault();

  const email = document.querySelector("input[type='email']").value.trim();
  const password = document.querySelector("input[type='password']").value.trim();

  const messageEl = document.getElementById("message");
  if (messageEl) {
    messageEl.textContent = "Logging in...";
    messageEl.style.color = "#2b7a78";
  }

  const result = await loginUser(email, password);

  if (result.success) {
    redirectToDashboard(result.role);
  } else {
    if (messageEl) {
      messageEl.style.color = "red";
      messageEl.textContent = result.message;
    } else {
      alert(result.message);
    }
  }
});

</script>

</body>
</html>
